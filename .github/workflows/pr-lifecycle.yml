name: PR Lifecycle Handler

# Handles all pull_request_target:closed events in one place:
#   - Merged PR  → add approval labels, remove size/* and review-needed
#   - Closed without merge → replace all labels with invalid

on:
  pull_request_target:
    types: [closed]

permissions: {}

jobs:
  # ── PR merged ────────────────────────────────────────────────────────────────
  handle_merged_pr:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: github.event.pull_request.merged == true
    steps:
      - name: Apply post-merge labels and clean up
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const number = context.payload.pull_request.number;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels: ['gssoc:approved', 'mentor:knoxiboy', 'quality:clean'],
            });

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
            });

            for (const label of labels) {
              if (!label.name.startsWith('size/') && label.name !== 'review-needed') continue;
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  name: label.name,
                });
                console.log(`Removed label: ${label.name}`);
              } catch (e) {
                console.log(`Failed to remove label ${label.name}`, e);
              }
            }

  # ── PR closed without merge ──────────────────────────────────────────────────
  handle_unmerged_pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event.pull_request.merged == false
    steps:
      - name: Replace all labels with invalid
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const number = context.payload.pull_request.number;

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels: ['invalid'],
            });

            console.log(`PR #${number} closed without merge — labels replaced with [invalid].`);
